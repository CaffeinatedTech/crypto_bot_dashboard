<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading Bot Dashboard</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #form {
        margin-bottom: 20px;
      }
      input {
        padding: 10px;
        font-size: 1rem;
      }
      button {
        padding: 10px 20px;
        font-size: 1rem;
        cursor: pointer;
      }
      #dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        width: 100%;
      }
      .dashboard {
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        text-align: center;
        position: relative;
        cursor: move;
      }
      .dashboard .status-indicator {
        width: 15px;
        height: 15px;
        border-radius: 50%;
        position: absolute;
        top: 10px;
        left: 10px;
      }
      .status.connected {
        background-color: green;
      }
      .status.disconnected {
        background-color: red;
      }
      .remove-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: none;
        border: none;
        cursor: pointer;
      }
      .remove-btn img {
        width: 20px;
        height: 20px;
      }
      .price,
      .pair,
      .profit,
      .pnl,
      .trades {
        font-size: 1.2rem;
        margin: 10px 0;
      }
      .profit,
      .pnl {
        color: green;
      }
      .pair {
        font-weight: bold;
      }

      .price-meter {
        width: 100%;
        height: 20px;
        background-color: #ddd;
        border-radius: 5px;
        overflow: hidden;
        margin: 20px 0;
        position: relative;
      }
      .price-indicator {
        height: 100%;
        background-color: #4caf50;
        border-radius: 5px;
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        transition: width 0.3s ease;
      }
      .meter-labels {
        display: flex;
        justify-content: space-between;
        font-size: 0.9rem;
        margin-top: -15px;
      }

      /* Media query for smaller screens */
      @media (max-width: 768px) {
        body {
          padding: 10px;
        }

        input,
        button {
          padding: 8px;
          font-size: 0.9rem;
        }

        #dashboard-grid {
          gap: 15px;
        }

        .dashboard {
          padding: 15px;
        }

        .price,
        .pair,
        .profit,
        .pnl,
        .trades {
          font-size: 1rem;
        }

        .price-meter {
          margin: 15px 2px;
          height: 15px;
        }

        .price-indicator {
          height: 15px;
        }

        .meter-labels {
          font-size: 0.8rem;
          margin-top: -10px;
        }
      }

      /* Media query for very small screens (e.g., smartphones) */
      @media (max-width: 480px) {
        input,
        button {
          padding: 6px;
          font-size: 0.8rem;
        }

        .dashboard {
          padding: 10px;
        }

        .price,
        .pair,
        .profit,
        .pnl,
        .trades {
          font-size: 0.9rem;
        }

        .price-meter {
          margin: 10px 2px;
          height: 12px;
        }

        .price-indicator {
          height: 12px;
        }

        .meter-labels {
          font-size: 0.7rem;
          margin-top: -10px;
        }
      }

      .grab-handle {
        width: 20px;
        height: 20px;
        background-color: #ccc;
        position: absolute;
        top: 10px;
        left: 30px;
        border-radius: 3px;
        cursor: grab;
      }

      .grab-handle::before,
      .grab-handle::after {
        content: "";
        position: absolute;
        left: 5px;
        right: 5px;
        height: 2px;
        background-color: #666;
      }

      .grab-handle::before {
        top: 6px;
      }

      .grab-handle::after {
        bottom: 6px;
      }

      .dashboard.dragging {
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <h1>Bot Dashboard</h1>

    <!-- Grid layout for displaying bot stats -->
    <div id="dashboard-grid"></div>

    <script>
      let bots = {};
      let draggedElement = null;

      // Setup WebSocket connection
      const wsUrl = `wss://${window.location.host}/ws`;
      let socket;
      let reconnectAttempts = 0;
      const maxReconnectDelay = 30000; // Maximum delay between reconnect attempts (30 seconds)

      function connectWebsocket() {
        if (
          socket &&
          (socket.readyState === WebSocket.OPEN ||
            socket.readyState === WebSocket.CONNECTING)
        ) {
          console.log("WebSocket is already connected or connecting.");
          return;
        }
        socket = new WebSocket(wsUrl);

        socket.onopen = () => {
          console.log("Connected to WebSocket server");
          reconnectAttempts = 0; // Reset reconnection attempts on successful connection
        };

        // Handle incoming messages from the server
        socket.onmessage = (event) => {
          const data = JSON.parse(event.data);
          thisBot = data;
          thisBot["last_updated"] = Date.now();
          thisBot["status"] = "connected";
          bots[thisBot.name] = thisBot;
          updateDashboard();
        };

        // Handle errors
        socket.onerror = (error) => {
          console.error("Websocket error occurred:", error);
          reconnectWithBackoff();
        };

        // Handle connection close
        socket.onclose = () => {
          console.log("Disconnected from the WebSocket server");
          reconnectWithBackoff();
        };
      }

      function reconnectWithBackoff() {
        const delay = Math.min(
          1000 * Math.pow(2, reconnectAttempts),
          maxReconnectDelay,
        );
        console.log(`Attempting to reconnect in ${delay}ms...`);

        setTimeout(() => {
          reconnectAttempts++;
          connectWebsocket();
        }, delay);
      }

      // Update the dashboard with the latest bot data
      function updateDashboard() {
        const dashboardGrid = document.getElementById("dashboard-grid");
        dashboardGrid.innerHTML = "";

        Object.keys(bots).forEach((key) => {
          const bot = bots[key];
          const dashboard = document.createElement("div");
          dashboard.className = "dashboard";
          dashboard.setAttribute("draggable", "true");
          dashboard.setAttribute("data-bot-name", key);
          let priceIndicatorWidth =
            ((bot.current_price - bot.next_buy_order) /
              (bot.next_sell_order - bot.next_buy_order)) *
            100;
          if (priceIndicatorWidth > 100) {
            priceIndicatorWidth = 100;
          } else if (priceIndicatorWidth < 0) {
            priceIndicatorWidth = 0;
          }

          dashboard.innerHTML = `
      <div class="status-indicator status ${bot.status}"></div>
      <div class="grab-handle"></div>
      <div class="pair">${bot.name}</div>
      <div class="price">Price: ${bot.current_price}</div>
      <div class="trades">Trades: ${bot.trades}</div>
      <div class="profit">Bot Profit: ${bot.profit}</div>
      <div class="pnl">PnL: ${bot.pnl}</div>
      <!-- Price meter bar -->
      <div class="price-meter">
        <div class="price-indicator" style="width: ${priceIndicatorWidth}%;"></div>
      </div>
      <div class="meter-labels">
        <span class="next-buy">Buy: ${bot.next_buy_order}</span>
        <span class="next-sell">Sell: ${bot.next_sell_order}</span>
      </div>
    `;
          dashboard.addEventListener("dragstart", dragStart);
          dashboard.addEventListener("dragover", dragOver);
          dashboard.addEventListener("dragenter", dragEnter);
          dashboard.addEventListener("dragleave", dragLeave);
          dashboard.addEventListener("drop", drop);
          dashboard.addEventListener("dragend", dragEnd);
          dashboardGrid.appendChild(dashboard);
        });
      }

      function dragStart(e) {
        draggedElement = this;
        setTimeout(() => this.classList.add("dragging"), 0);
      }

      function dragOver(e) {
        e.preventDefault();
      }

      function dragEnter(e) {
        e.preventDefault();
        this.classList.add("drag-over");
      }

      function dragLeave(e) {
        this.classList.remove("drag-over");
      }

      function drop(e) {
        e.preventDefault();
        this.classList.remove("drag-over");
        if (this !== draggedElement) {
          const allDashboards = Array.from(
            document.querySelectorAll(".dashboard"),
          );
          const draggedIndex = allDashboards.indexOf(draggedElement);
          const droppedIndex = allDashboards.indexOf(this);

          if (draggedIndex > droppedIndex) {
            this.parentNode.insertBefore(draggedElement, this);
          } else {
            this.parentNode.insertBefore(draggedElement, this.nextSibling);
          }

          // Update the order of bots object
          const newOrder = {};
          document.querySelectorAll(".dashboard").forEach((dashboard) => {
            const botName = dashboard.getAttribute("data-bot-name");
            newOrder[botName] = bots[botName];
          });
          bots = newOrder;
        }
      }

      function dragEnd(e) {
        this.classList.remove("dragging");
        draggedElement = null;
      }

      // Check each bot's last_updated time every 5 minutes
      setInterval(() => {
        Object.keys(bots).forEach((key) => {
          const bot = bots[key];
          if (Date.now() - bot.last_updated > 300000) {
            bots[key]["status"] = "disconnected";
          }
        });
        updateDashboard();
      }, 300000);

      connectWebsocket();
    </script>
  </body>
</html>
